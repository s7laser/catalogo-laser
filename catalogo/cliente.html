<script>

let carrinho = []
let produtos = []
let fotosAtual = []
let fotoIndex = 0

function calcularPreco(produto, qtd){

let faixas = Object.keys(produto.precos)
.map(f => parseInt(f))
.sort((a,b) => a - b)

let preco = produto.precos[faixas[0]]

faixas.forEach(faixa => {
if(qtd >= faixa){
preco = Number(produto.precos[faixa])
}
})

return preco
}

/* ===== CARRINHO ===== */

function renderCarrinho(){
let box = document.getElementById("carrinhoBox")

if(carrinho.length === 0){
box.innerHTML = "Carrinho vazio"
return
}

let totalGeral = 0
let html = "<strong>Seu pedido:</strong><br><br>"

carrinho.forEach((p,i)=>{
totalGeral += p.total

html += `
<div class="item-carrinho">
<div>
${p.codigo} - ${p.nome}<br>
${p.quantidade} un. | ${p.cor}<br>
R$ ${p.total.toFixed(2).replace('.', ',')}
</div>
<span class="remover" onclick="removerItem(${i})">Remover</span>
</div>
`
})

html += `<hr><strong>Total: R$ ${totalGeral.toFixed(2).replace('.', ',')}</strong>`
box.innerHTML = html
}

function toggleCarrinho(){
let box = document.getElementById("carrinhoBox")
box.style.display = box.style.display === "none" ? "block" : "none"
renderCarrinho()
}

function removerItem(i){
carrinho.splice(i,1)
renderCarrinho()
}

/* ===== MODAL ===== */

function abrirModalProduto(index){

let p = produtos[index]

fotosAtual = p.fotos && p.fotos.length ? p.fotos : [p.foto]
fotoIndex = 0

mostrarFoto()

document.getElementById("descModal").innerText = p.descricao || ""
document.getElementById("modal").style.display = "block"
}

function mostrarFoto(){
document.getElementById("imgModal").src = "../" + fotosAtual[fotoIndex]
}

function proxima(){
fotoIndex = (fotoIndex + 1) % fotosAtual.length
mostrarFoto()
}

function anterior(){
fotoIndex = (fotoIndex - 1 + fotosAtual.length) % fotosAtual.length
mostrarFoto()
}

function fecharModal(e){
if(e) e.stopPropagation()
document.getElementById("modal").style.display = "none"
}

document.addEventListener("keydown", function(e){
if(e.key === "Escape"){
fecharModal()
}
})

/* ===== CARREGAR ===== */

fetch("https://opensheet.elk.sh/1ujUO0slYAkmxuxOLEOcAYVl1w9WNkIDY9rQpOfhtQtE/CATALOGO")
.then(res => res.json())
.then(data => {

produtos = data.map(p => {

let precos = {}

for(let i = 1; i <= 5; i++){

let qtd = parseInt(p["qtd_" + i])
let preco = parseFloat(p["preco_" + i])

if(qtd && preco){
precos[qtd] = preco
}

}

let cores = []
if(p.cores){
cores = p.cores.split(",").map(c=>c.trim())
}

let codigo = p.codigo

return {
codigo: codigo,
nome: p.nome,
descricao: p.descricao,
foto: codigo + ".jpg",
fotos: [
codigo + "_1.jpg",
codigo + "_2.jpg",
codigo + "_3.jpg"
],
quantidade_minima: parseInt(p.quantidade_minima),
cores: cores,
precos: precos
}

})

let grid = document.getElementById("grid")

produtos.forEach((p,index) => {

let card = document.createElement("div")
card.className = "card"

let coresHTML = '<option value="">Cor</option>'

if(p.cores.length){
p.cores.forEach(c=>{
coresHTML += `<option>${c}</option>`
})
} else {
coresHTML = '<option value="Único">Cor única</option>'
}

/* 🔥 FILTRO DE QUANTIDADES */
let opcoesQtd = Object.keys(p.precos)
.map(q => parseInt(q))
.filter(q => q >= p.quantidade_minima)
.sort((a,b)=>a-b)

/* 🔥 EXIBIÇÃO DE PREÇOS */
let precosHTML = ""
opcoesQtd.forEach(q=>{
precosHTML += `${q}: R$ ${p.precos[q].toFixed(2).replace('.', ',')}<br>`
})

/* 🔥 SELECT DE QUANTIDADE */
let qtdHTML = opcoesQtd.map(q=>`<option value="${q}">${q} un.</option>`).join("")

card.innerHTML = `
<img src="../${p.foto}" onclick="abrirModalProduto(${index})">
<b>${p.codigo}</b><br>
${p.nome}

<div class="preco">
<strong>Ped. min.:</strong> ${p.quantidade_minima} un.<br><br>
${precosHTML}
</div>

<div class="acoes">

<select id="cor_${index}">
${coresHTML}
</select>

<div class="qtd-box">
<select id="qtd_${index}">
${qtdHTML}
</select>
<button class="btn-inserir" onclick="adicionar(${index})">
Inserir
</button>
</div>

</div>
`

grid.appendChild(card)

})

})

/* ===== ADICIONAR ===== */

function adicionar(index){

let qtd = parseInt(document.getElementById(`qtd_${index}`).value)
let cor = document.getElementById(`cor_${index}`).value

if(!cor){
alert("Selecione uma cor")
return
}

let produto = produtos[index]
let precoUnit = calcularPreco(produto, qtd)

let totalItem = precoUnit * qtd

carrinho.push({
codigo: produto.codigo,
nome: produto.nome,
quantidade:qtd,
cor,
total:totalItem
})

renderCarrinho()
}

/* ===== WHATSAPP ===== */

function enviarPedido(){

if(carrinho.length === 0){
alert("Adicione produtos ao pedido")
return
}

let totalGeral = 0
let msg = "Olá, gostaria de fazer um pedido:%0A%0A"

carrinho.forEach(p=>{
totalGeral += p.total

msg += `${p.codigo} - ${p.nome}%0A`
msg += `${p.quantidade} un. | ${p.cor}%0A`
msg += `Total: R$ ${p.total.toFixed(2)}%0A%0A`
})

msg += `Total do pedido: R$ ${totalGeral.toFixed(2)}`

window.open(`https://wa.me/5511981804216?text=${msg}`)
}

</script>
