<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Catálogo</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:20px;
}

/* TOPO */
.topo{
display:flex;
flex-direction:column;
align-items:center;
margin-bottom:20px;
}

.topo img{
max-width:180px;
margin-bottom:10px;
}

.titulo{
font-size:28px;
font-weight:bold;
}

/* BOTÕES */
.topo-botoes{
display:flex;
gap:10px;
margin-bottom:15px;
justify-content:center;
}

.btn{
padding:10px;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

.btn-azul{ background:#007bff; }
.btn-verde{ background:green; }

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:16px;
max-width:1200px;
margin:auto;
}

@media(min-width:600px){
.grid{ grid-template-columns:repeat(3,1fr); }
}

@media(min-width:900px){
.grid{ grid-template-columns:repeat(4,1fr); }
}

/* CARD */
.card{
background:white;
padding:12px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.15);
display:flex;
flex-direction:column;
}

.card img{
width:100%;
height:120px;
object-fit:contain;
cursor:pointer;
}

/* OPÇÕES */
.opcao-qtd{
display:flex;
align-items:center;
gap:6px;
margin-top:6px;
padding:4px;
border-radius:6px;
cursor:pointer;
font-size:11px;
}

.opcao-qtd.ativo{
background:#e7f1ff;
border:1px solid #007bff;
}

/* AÇÕES */
.acoes{
margin-top:auto;
}

select{
width:100%;
margin-top:10px;
height:34px;
}

.btn-inserir{
width:100%;
margin-top:8px;
height:34px;
background:#007bff;
color:white;
border:none;
border-radius:6px;
}

/* CONSULTA */
.btn-consulta{
width:100%;
margin-top:10px;
padding:10px;
background:#888;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

/* CARRINHO */
.carrinho{
display:none;
background:white;
padding:10px;
margin:10px auto;
max-width:600px;
border-radius:10px;
}

.item{
margin-bottom:10px;
font-size:13px;
}

.remover{
color:red;
cursor:pointer;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
z-index:999;
}

.modal-content{
position:relative;
max-width:500px;
margin:auto;
padding:10px;
text-align:center;
}

.modal img{
width:100%;
max-height:60vh;
object-fit:contain;
}

.modal-desc{
color:white;
margin-top:10px;
}

.close{
position:fixed;
top:15px;
right:20px;
color:white;
font-size:30px;
cursor:pointer;
}

.nav{
position:absolute;
top:50%;
transform:translateY(-50%);
background:rgba(0,0,0,0.5);
color:white;
border:none;
font-size:24px;
padding:10px;
cursor:pointer;
border-radius:50%;
}

.prev{ left:10px; }
.next{ right:10px; }

</style>
</head>

<body>

<div class="topo">
<img src="../logo.png">
<div class="titulo">Catálogo de Produtos</div>
</div>

<div class="topo-botoes">
<button class="btn btn-azul" onclick="toggleCarrinho()">Carrinho</button>
<button class="btn btn-verde" onclick="enviarPedido()">Enviar</button>
</div>

<div id="carrinho" class="carrinho"></div>
<div class="grid" id="grid"></div>

<!-- MODAL -->
<div id="modal" class="modal">
<span class="close" onclick="fecharModal()">✕</span>

<div class="modal-content">
<button class="nav prev" onclick="anterior()">❮</button>
<img id="modalImg">
<button class="nav next" onclick="proxima()">❯</button>
<div id="modalDesc" class="modal-desc"></div>
</div>
</div>

<script>

let produtos=[]
let carrinho=[]
let fotos=[]
let fotoIndex=0

fetch("https://opensheet.elk.sh/1ujUO0slYAkmxuxOLEOcAYVl1w9WNkIDY9rQpOfhtQtE/CATALOGO")
.then(r=>r.json())
.then(data=>{

produtos=data.map(p=>{

let precos={}
for(let i=1;i<=5;i++){
let q=parseInt(p["qtd_"+i])
let v=parseFloat(p["preco_"+i])

if(!isNaN(q) && !isNaN(v) && v > 0){
precos[q]=v
}
}

return{
codigo:p.codigo,
nome:p.nome,
descricao:p.descricao || "",
foto:p.codigo+".jpg",
fotos:p.fotos ? p.fotos.split(",") : [p.codigo+".jpg"],
cores:p.cores ? p.cores.split(",") : [],
min:parseInt(p.quantidade_minima),
precos
}

})

render()

})

function render(){

let grid=document.getElementById("grid")
grid.innerHTML=""

produtos.forEach((p,i)=>{

let opcoes=Object.keys(p.precos)
.map(n=>parseInt(n))
.filter(n=>n>=p.min)
.sort((a,b)=>a-b)

let opHTML=""

if(opcoes.length===0){

opHTML=`
<button class="btn-consulta" onclick="consultar(${i})">
Consultar preço
</button>
`

}else{

opHTML=opcoes.map((q,idx)=>`
<label class="opcao-qtd ${idx==0?'ativo':''}">
<input type="radio" name="qtd_${i}" value="${q}" ${idx==0?'checked':''}>
${q} un - R$ ${p.precos[q].toFixed(2)}
</label>
`).join("")

}

let cores='<option value="">Cor</option>'
p.cores.forEach(c=>cores+=`<option>${c}</option>`)

let card=document.createElement("div")
card.className="card"

card.innerHTML=`
<img src="../${p.foto}" onclick="abrirModal(${i})">
<b>${p.codigo}</b>
<div>${p.nome}</div>

${opHTML}

<div class="acoes">
<select id="cor_${i}">
${cores}
</select>

<button class="btn-inserir" onclick="add(${i})">
Inserir
</button>
</div>
`

grid.appendChild(card)

card.querySelectorAll("input").forEach(r=>{
r.onchange=()=>{
card.querySelectorAll(".opcao-qtd").forEach(x=>x.classList.remove("ativo"))
r.parentElement.classList.add("ativo")
}
})

})

}

function consultar(i){

let p=produtos[i]

let msg=`Olá, gostaria de consultar o produto:%0A${p.codigo} - ${p.nome}`

window.open(`https://wa.me/5511981804216?text=${msg}`)
}

function add(i){

let p=produtos[i]

if(Object.keys(p.precos).length===0){
alert("Produto sob consulta")
return
}

let r=document.querySelector(`input[name=qtd_${i}]:checked`)
let cor=document.getElementById(`cor_${i}`).value

if(!cor){
alert("Selecione cor")
return
}

let qtd=parseInt(r.value)
let total=p.precos[qtd]*qtd

carrinho.push({...p,qtd,cor,total})

renderCarrinho()
}

function renderCarrinho(){

let box=document.getElementById("carrinho")

if(!carrinho.length){
box.innerHTML="Carrinho vazio"
return
}

let total=0
let html=""

carrinho.forEach((p,i)=>{
total+=p.total
html+=`
<div class="item">
${p.nome}<br>
${p.qtd} un | ${p.cor}<br>
R$ ${p.total.toFixed(2)}<br>
<span class="remover" onclick="remover(${i})">Remover</span>
<hr>
</div>`
})

html+=`<b>Total R$ ${total.toFixed(2)}</b>`
box.innerHTML=html
}

function remover(i){
carrinho.splice(i,1)
renderCarrinho()
}

function toggleCarrinho(){
let b=document.getElementById("carrinho")
b.style.display=b.style.display=="none"?"block":"none"
renderCarrinho()
}

function enviarPedido(){

if(!carrinho.length) return alert("Carrinho vazio")

let msg="Pedido:%0A"
let total=0

carrinho.forEach(p=>{
total+=p.total
msg+=`${p.nome}%0A${p.qtd} un%0A`
})

msg+=`Total ${total}`

window.open(`https://wa.me/5511981804216?text=${msg}`)
}

/* MODAL */

function abrirModal(i){
fotos=produtos[i].fotos
fotoIndex=0

document.getElementById("modalDesc").innerText=produtos[i].descricao

mostrar()

document.querySelector(".prev").style.display = fotos.length>1?"block":"none"
document.querySelector(".next").style.display = fotos.length>1?"block":"none"

document.getElementById("modal").style.display="block"
}

function mostrar(){
document.getElementById("modalImg").src="../"+fotos[fotoIndex]
}

function fecharModal(){
document.getElementById("modal").style.display="none"
}

function proxima(){
fotoIndex=(fotoIndex+1)%fotos.length
mostrar()
}

function anterior(){
fotoIndex=(fotoIndex-1+fotos.length)%fotos.length
mostrar()
}

</script>

</body>
</html>
