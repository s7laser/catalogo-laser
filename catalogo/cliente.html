<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Catálogo de Produtos</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:20px;
}

/* TOPO */
.topo{
display:flex;
flex-direction:column;
align-items:center;
margin-bottom:20px;
}

.topo img{
max-width:180px;
margin-bottom:10px;
}

.titulo{
font-size:28px;
font-weight:bold;
color:#333;
}

/* BOTÕES TOPO */
.topo-botoes{
display:flex;
gap:10px;
margin-bottom:15px;
justify-content:center;
}

.btn{
padding:10px;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

.btn-azul{ background:#007bff; }
.btn-verde{ background:green; }

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:16px;
max-width:1200px;
margin:auto;
}

@media(min-width:600px){
.grid{ grid-template-columns:repeat(3,1fr); }
}

@media(min-width:900px){
.grid{ grid-template-columns:repeat(4,1fr); }
}

/* CARD */
.card{
background:white;
padding:12px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.15);
display:flex;
flex-direction:column;
}

.card img{
width:100%;
height:120px;
object-fit:contain;
margin-bottom:6px;
}

/* OPÇÕES */
.opcao-qtd{
display:flex;
align-items:center;
gap:6px;
margin-top:6px;
padding:4px;
border-radius:6px;
cursor:pointer;
transition:0.2s;
font-size:13px;
}

.opcao-qtd input{
accent-color:#007bff;
}

.opcao-qtd.ativo{
background:#e7f1ff;
border:1px solid #007bff;
}

/* BLOCO INFERIOR */
.acoes{
margin-top:auto;
}

/* INPUTS */
select{
width:100%;
margin-top:10px;
height:34px;
border-radius:6px;
border:1px solid #ccc;
}

.btn-inserir{
width:100%;
margin-top:8px;
height:34px;
background:#007bff;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

/* CARRINHO */
.carrinho{
display:none;
background:white;
padding:10px;
margin:10px auto;
max-width:600px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.15);
}

.item{
margin-bottom:10px;
font-size:13px;
}

.remover{
color:red;
cursor:pointer;
font-size:12px;
}

</style>
</head>

<body>

<div class="topo">
<img src="../logo.png">
<div class="titulo">Catálogo de Produtos</div>
</div>

<div class="topo-botoes">
<button class="btn btn-azul" onclick="toggleCarrinho()">Ver carrinho</button>
<button class="btn btn-verde" onclick="enviarPedido()">Enviar pedido</button>
</div>

<div id="carrinho" class="carrinho"></div>

<div class="grid" id="grid"></div>

<script>

let produtos = []
let carrinho = []

fetch("https://opensheet.elk.sh/1ujUO0slYAkmxuxOLEOcAYVl1w9WNkIDY9rQpOfhtQtE/CATALOGO")
.then(res => res.json())
.then(data => {

produtos = data.map(p => {

let precos = {}

for(let i=1;i<=5;i++){
let qtd = parseInt(p["qtd_"+i])
let preco = parseFloat(p["preco_"+i])

if(!isNaN(qtd) && !isNaN(preco)){
precos[qtd]=preco
}
}

return{
codigo:p.codigo,
nome:p.nome,
foto:p.codigo+".jpg",
cores:p.cores ? p.cores.split(",") : [],
min:parseInt(p.quantidade_minima),
precos
}

})

render()

})

function render(){

let grid = document.getElementById("grid")
grid.innerHTML=""

produtos.forEach((p,index)=>{

let opcoes = Object.keys(p.precos)
.map(q=>parseInt(q))
.filter(q=>q>=p.min)
.sort((a,b)=>a-b)

if(opcoes.length===0) return

let opHTML = opcoes.map((q,i)=>`
<label class="opcao-qtd ${i===0?'ativo':''}">
<input type="radio" name="qtd_${index}" value="${q}" ${i===0?'checked':''}>
${q} un. - R$ ${p.precos[q].toFixed(2).replace('.',',')}
</label>
`).join("")

let coresHTML = '<option value="">Cor</option>'
if(p.cores.length){
p.cores.forEach(c=> coresHTML+=`<option>${c}</option>`)
}else{
coresHTML = '<option value="Único">Cor única</option>'
}

let card = document.createElement("div")
card.className="card"

card.innerHTML=`
<img src="../${p.foto}">
<b>${p.codigo}</b>
<div>${p.nome}</div>

${opHTML}

<div class="acoes">
<select id="cor_${index}">
${coresHTML}
</select>

<button class="btn-inserir" onclick="adicionar(${index})">Inserir</button>
</div>
`

grid.appendChild(card)

/* destaque seleção */
let radios = card.querySelectorAll(`input[name="qtd_${index}"]`)
radios.forEach(r=>{
r.addEventListener("change", ()=>{
card.querySelectorAll(".opcao-qtd").forEach(el=>el.classList.remove("ativo"))
r.parentElement.classList.add("ativo")
})
})

})

}

/* adicionar item */
function adicionar(index){

let radio = document.querySelector(`input[name="qtd_${index}"]:checked`)
if(!radio) return

let qtd = parseInt(radio.value)
let cor = document.getElementById(`cor_${index}`).value

if(!cor){
alert("Selecione uma cor")
return
}

let p = produtos[index]
let total = p.precos[qtd] * qtd

carrinho.push({
codigo:p.codigo,
nome:p.nome,
qtd,
cor,
total
})

renderCarrinho()
}

/* carrinho */
function renderCarrinho(){

let box = document.getElementById("carrinho")

if(carrinho.length===0){
box.innerHTML="Carrinho vazio"
return
}

let total=0
let html=""

carrinho.forEach((p,i)=>{
total+=p.total

html+=`
<div class="item">
${p.codigo} - ${p.nome}<br>
${p.qtd} un | ${p.cor}<br>
R$ ${p.total.toFixed(2)}<br>
<span class="remover" onclick="removerItem(${i})">Remover</span>
<hr>
</div>
`
})

html+=`<b>Total: R$ ${total.toFixed(2)}</b>`

box.innerHTML=html
}

/* remover item */
function removerItem(i){
carrinho.splice(i,1)
renderCarrinho()
}

/* toggle carrinho */
function toggleCarrinho(){
let box=document.getElementById("carrinho")
box.style.display = box.style.display==="none" ? "block" : "none"
renderCarrinho()
}

/* whatsapp */
function enviarPedido(){

if(carrinho.length===0){
alert("Carrinho vazio")
return
}

let msg="Olá, gostaria de fazer um pedido:%0A%0A"
let total=0

carrinho.forEach(p=>{
total+=p.total
msg+=`${p.codigo} - ${p.nome}%0A${p.qtd} un | ${p.cor}%0AR$ ${p.total.toFixed(2)}%0A%0A`
})

msg+=`Total: R$ ${total.toFixed(2)}`

window.open(`https://wa.me/5511981804216?text=${msg}`)
}

</script>

</body>
</html>
