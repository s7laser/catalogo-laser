<script>

let produtos=[]
let carrinho=[]
let fotos=[]
let fotoIndex=0

fetch("https://opensheet.elk.sh/1ujUO0slYAkmxuxOLEOcAYVl1w9WNkIDY9rQpOfhtQtE/CATALOGO")
.then(r=>r.json())
.then(data=>{

produtos=data.map(p=>{

let precos={}
for(let i=1;i<=5;i++){
let q=parseInt(p["qtd_"+i])
let v=parseFloat(p["preco_"+i])
if(!isNaN(q) && !isNaN(v) && v > 0){
precos[q]=v
}
}

return{
codigo:p.codigo,
nome:p.nome,
descricao:p.descricao || "",
foto:p.codigo+".jpg",
fotos:p.fotos ? p.fotos.split(",") : [p.codigo+".jpg"],
cores:p.cores ? p.cores.split(",") : [],
video: p.video || "",
min:parseInt(p.quantidade_minima),
precos
}

})

render()

})

function render(){

let grid=document.getElementById("grid")
grid.innerHTML=""

produtos.forEach((p,i)=>{

let opcoes=Object.keys(p.precos)
.map(n=>parseInt(n))
.filter(n=>n>=p.min)
.sort((a,b)=>a-b)

let opHTML=""

if(opcoes.length===0){
opHTML=`<button class="btn-consulta" onclick="consultar(${i})">Consultar preço</button>`
}else{
opHTML=opcoes.map((q,idx)=>`
<label class="opcao-qtd ${idx==0?'ativo':''}">
<input type="radio" name="qtd_${i}" value="${q}" ${idx==0?'checked':''}>
${q} un - R$ ${p.precos[q].toFixed(2)}
</label>
`).join("")
}

let cores='<option value="">Cor</option>'
p.cores.forEach(c=>cores+=`<option>${c}</option>`)

let card=document.createElement("div")
card.className="card"

card.innerHTML=`
<div class="card-img">
<img src="../${p.foto}" onclick="abrirModal(${i})">
${p.video ? `<div class="icone-video">▶</div>` : ""}
</div>

<b>${p.codigo}</b>
<div>${p.nome}</div>

${opHTML}

<div class="acoes">
<select id="cor_${i}">${cores}</select>
<button class="btn-inserir" onclick="add(${i})">Inserir</button>
</div>
`

grid.appendChild(card)

card.querySelectorAll("input").forEach(r=>{
r.onchange=()=>{
card.querySelectorAll(".opcao-qtd").forEach(x=>x.classList.remove("ativo"))
r.parentElement.classList.add("ativo")
}
})

})

}

function abrirModal(i){

let p=produtos[i]

fotos=p.fotos
fotoIndex=0

document.getElementById("modalDesc").innerText=p.descricao

let box=document.getElementById("videoBtn")

if(p.video){
box.innerHTML=`<button class="btn-video" onclick="abrirVideo('${p.video}')">Ver vídeo</button>`
}else{
box.innerHTML=""
}

mostrar()

document.querySelector(".prev").style.display = fotos.length>1?"block":"none"
document.querySelector(".next").style.display = fotos.length>1?"block":"none"

document.getElementById("modal").style.display="block"
}

/* 🔥 ALTERAÇÃO AQUI */
function abrirVideo(link){

let id=""

if(link.includes("watch?v=")){
id = link.split("watch?v=")[1]
}else if(link.includes("youtu.be/")){
id = link.split("youtu.be/")[1]
}

/* substitui botão por vídeo */
document.getElementById("videoBtn").innerHTML = `
<iframe width="100%" height="220"
src="https://www.youtube.com/embed/${id}"
frameborder="0"
allowfullscreen>
</iframe>

<button class="btn-video" onclick="fecharVideo()">Fechar vídeo</button>
`
}

function fecharVideo(){
document.getElementById("videoBtn").innerHTML = ""
}

function mostrar(){
document.getElementById("modalImg").src="../"+fotos[fotoIndex]
}

function fecharModal(){
document.getElementById("modal").style.display="none"
}

function proxima(){
fotoIndex=(fotoIndex+1)%fotos.length
mostrar()
}

function anterior(){
fotoIndex=(fotoIndex-1+fotos.length)%fotos.length
mostrar()
}

/* RESTANTE IGUAL */

</script>
