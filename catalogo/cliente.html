<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Catálogo</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:15px;
}

/* TOPO */
.topo{
display:flex;
flex-direction:column;
align-items:center;
margin-bottom:20px;
}

.topo img{
max-width:160px;
margin-bottom:8px;
}

.titulo{
font-size:22px;
font-weight:600;
color:#333;
}

/* BOTÕES */
.topo-botoes{
display:flex;
gap:10px;
margin-bottom:15px;
justify-content:center;
}

.btn{
padding:10px;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
font-size:14px;
}

.btn-azul{ background:#007bff; }
.btn-verde{ background:#28a745; }

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
max-width:1200px;
margin:auto;
}

@media(min-width:600px){
.grid{ grid-template-columns:repeat(3,1fr); }
}

@media(min-width:900px){
.grid{ grid-template-columns:repeat(4,1fr); }
}

/* CARD */
.card{
background:white;
padding:12px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
display:flex;
flex-direction:column;
text-align:center;
align-items:center;
}

.card-img{
position:relative;
width:100%;
}

.card img{
width:100%;
height:120px;
object-fit:contain;
cursor:pointer;
margin-bottom:6px;
}

/* ÍCONE PLAY ANIMADO */
.icone-video{
position:absolute;
top:6px;
right:6px;
background:rgba(0,0,0,0.6);
color:white;
font-size:12px;
padding:6px 8px;
border-radius:50%;
pointer-events:none;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{ transform:scale(1); opacity:1; }
50%{ transform:scale(1.2); opacity:0.7; }
100%{ transform:scale(1); opacity:1; }
}

.card b{
font-size:13px;
color:#666;
}

.card div{
font-size:14px;
margin-bottom:4px;
}

/* OPÇÕES */
.opcao-qtd{
display:flex;
align-items:center;
gap:6px;
margin-top:4px;
padding:4px;
border-radius:6px;
cursor:pointer;
font-size:11px;
}

.opcao-qtd.ativo{
background:#e7f1ff;
border:1px solid #007bff;
}

/* AÇÕES */
.acoes{
margin-top:auto;
width:100%;
}

select{
width:100%;
margin-top:8px;
height:34px;
border-radius:6px;
border:1px solid #ccc;
}

.btn-inserir{
width:100%;
margin-top:6px;
height:34px;
background:#007bff;
color:white;
border:none;
border-radius:6px;
}

/* CONSULTA */
.btn-consulta{
width:100%;
margin-top:8px;
padding:8px;
background:#6c757d;
color:white;
border:none;
border-radius:6px;
}

/* CARRINHO */
.carrinho{
display:none;
background:white;
padding:12px;
margin:10px auto;
max-width:600px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.item{
margin-bottom:10px;
font-size:13px;
}

.remover{
color:red;
cursor:pointer;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
z-index:999;
overflow:auto;
}

.modal-content{
position:relative;
max-width:500px;
margin:auto;
padding:15px;
text-align:center;
}

.modal img{
width:100%;
max-height:60vh;
object-fit:contain;
}

.modal-desc{
color:white;
margin-top:10px;
font-size:13px;
line-height:1.4;
}

/* BOTÃO VÍDEO */
.btn-video{
margin-top:10px;
padding:10px;
background:#dc3545;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
width:100%;
}

/* FECHAR */
.close{
position:fixed;
top:10px;
right:10px;
background:rgba(0,0,0,0.6);
width:40px;
height:40px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
font-size:20px;
color:white;
cursor:pointer;
z-index:1000;
}

/* SETAS */
.nav{
position:absolute;
top:50%;
transform:translateY(-50%);
background:rgba(0,0,0,0.5);
color:white;
border:none;
font-size:20px;
padding:8px;
cursor:pointer;
border-radius:50%;
}

.prev{ left:5px; }
.next{ right:5px; }

</style>
</head>

<body>

<div class="topo">
<img src="../logo.png">
<div class="titulo">Catálogo de Produtos</div>
</div>

<div class="topo-botoes">
<button class="btn btn-azul" onclick="toggleCarrinho()">Carrinho</button>
<button class="btn btn-verde" onclick="enviarPedido()">Enviar</button>
</div>

<div id="carrinho" class="carrinho"></div>
<div class="grid" id="grid"></div>

<!-- MODAL -->
<div id="modal" class="modal">
<span class="close" onclick="fecharModal()">✕</span>

<div class="modal-content">
<button class="nav prev" onclick="anterior()">❮</button>
<img id="modalImg">
<button class="nav next" onclick="proxima()">❯</button>

<div id="modalDesc" class="modal-desc"></div>
<div id="videoBtn"></div>

</div>
</div>

<script>

let produtos=[]
let carrinho=[]
let fotos=[]
let fotoIndex=0

fetch("https://opensheet.elk.sh/1ujUO0slYAkmxuxOLEOcAYVl1w9WNkIDY9rQpOfhtQtE/CATALOGO")
.then(r=>r.json())
.then(data=>{

produtos=data.map(p=>{

let precos={}
for(let i=1;i<=5;i++){
let q=parseInt(p["qtd_"+i])
let v=parseFloat(p["preco_"+i])
if(!isNaN(q) && !isNaN(v) && v > 0){
precos[q]=v
}
}

return{
codigo:p.codigo,
nome:p.nome,
descricao:p.descricao || "",
foto:p.codigo+".jpg",
fotos:p.fotos ? p.fotos.split(",") : [p.codigo+".jpg"],
cores:p.cores ? p.cores.split(",") : [],
video: p.video || "",
min:parseInt(p.quantidade_minima),
precos
}

})

render()

})

function render(){

let grid=document.getElementById("grid")
grid.innerHTML=""

produtos.forEach((p,i)=>{

let opcoes=Object.keys(p.precos)
.map(n=>parseInt(n))
.filter(n=>n>=p.min)
.sort((a,b)=>a-b)

let opHTML=""

if(opcoes.length===0){
opHTML=`<button class="btn-consulta" onclick="consultar(${i})">Consultar preço</button>`
}else{
opHTML=opcoes.map((q,idx)=>`
<label class="opcao-qtd ${idx==0?'ativo':''}">
<input type="radio" name="qtd_${i}" value="${q}" ${idx==0?'checked':''}>
${q} un - R$ ${p.precos[q].toFixed(2)}
</label>
`).join("")
}

let cores='<option value="">Cor</option>'
p.cores.forEach(c=>cores+=`<option>${c}</option>`)

let card=document.createElement("div")
card.className="card"

card.innerHTML=`
<div class="card-img">
<img src="../${p.foto}" onclick="abrirModal(${i})">
${p.video ? `<div class="icone-video">▶</div>` : ""}
</div>

<b>${p.codigo}</b>
<div>${p.nome}</div>

${opHTML}

<div class="acoes">
<select id="cor_${i}">${cores}</select>
<button class="btn-inserir" onclick="add(${i})">Inserir</button>
</div>
`

grid.appendChild(card)

card.querySelectorAll("input").forEach(r=>{
r.onchange=()=>{
card.querySelectorAll(".opcao-qtd").forEach(x=>x.classList.remove("ativo"))
r.parentElement.classList.add("ativo")
}
})

})

}

function abrirModal(i){

let p=produtos[i]

fotos=p.fotos
fotoIndex=0

document.getElementById("modalDesc").innerText=p.descricao

// BOTÃO VIDEO
let box=document.getElementById("videoBtn")

if(p.video){
box.innerHTML=`<button class="btn-video" onclick="abrirVideo('${p.video}')">Ver vídeo</button>`
}else{
box.innerHTML=""
}

mostrar()

document.querySelector(".prev").style.display = fotos.length>1?"block":"none"
document.querySelector(".next").style.display = fotos.length>1?"block":"none"

document.getElementById("modal").style.display="block"
}

function abrirVideo(link){
window.open(link)
}

function mostrar(){
document.getElementById("modalImg").src="../"+fotos[fotoIndex]
}

function fecharModal(){
document.getElementById("modal").style.display="none"
}

function proxima(){
fotoIndex=(fotoIndex+1)%fotos.length
mostrar()
}

function anterior(){
fotoIndex=(fotoIndex-1+fotos.length)%fotos.length
mostrar()
}

/* resto igual */

</script>

</body>
</html>
