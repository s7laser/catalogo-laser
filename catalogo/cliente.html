<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Catálogo</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:15px;
}

/* TOPO */
.topo{
display:flex;
flex-direction:column;
align-items:center;
margin-bottom:20px;
}

.topo img{
max-width:160px;
margin-bottom:8px;
}

.titulo{
font-size:22px;
font-weight:600;
color:#333;
}

/* BOTÕES */
.topo-botoes{
display:flex;
gap:10px;
margin-bottom:15px;
justify-content:center;
}

.btn{
padding:10px;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
font-size:14px;
}

.btn-azul{ background:#007bff; }
.btn-verde{ background:#28a745; }

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
max-width:1200px;
margin:auto;
}

@media(min-width:600px){
.grid{ grid-template-columns:repeat(3,1fr); }
}

@media(min-width:900px){
.grid{ grid-template-columns:repeat(4,1fr); }
}

/* CARD */
.card{
background:white;
padding:12px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
display:flex;
flex-direction:column;
text-align:center;
align-items:center;
}

.card img{
width:100%;
height:120px;
object-fit:contain;
cursor:pointer;
margin-bottom:6px;
}

.card b{
font-size:13px;
color:#666;
}

.card div{
font-size:14px;
margin-bottom:4px;
}

/* OPÇÕES */
.opcao-qtd{
display:flex;
align-items:center;
gap:6px;
margin-top:4px;
padding:4px;
border-radius:6px;
cursor:pointer;
font-size:11px;
}

.opcao-qtd.ativo{
background:#e7f1ff;
border:1px solid #007bff;
}

/* AÇÕES */
.acoes{
margin-top:auto;
width:100%;
}

select{
width:100%;
margin-top:8px;
height:34px;
border-radius:6px;
border:1px solid #ccc;
}

.btn-inserir{
width:100%;
margin-top:6px;
height:34px;
background:#007bff;
color:white;
border:none;
border-radius:6px;
}

/* CONSULTA */
.btn-consulta{
width:100%;
margin-top:8px;
padding:8px;
background:#6c757d;
color:white;
border:none;
border-radius:6px;
}

/* CARRINHO */
.carrinho{
display:none;
background:white;
padding:12px;
margin:10px auto;
max-width:600px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.item{
margin-bottom:10px;
font-size:13px;
}

.remover{
color:red;
cursor:pointer;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
z-index:999;
}

.modal-content{
position:relative;
max-width:500px;
margin:auto;
padding:15px;
text-align:center;
}

.modal img{
width:100%;
max-height:60vh;
object-fit:contain;
}

/* DESCRIÇÃO */
.modal-desc{
color:white;
margin-top:10px;
font-size:13px;
line-height:1.4;
}

/* BOTÃO FECHAR MELHORADO */
.close{
position:fixed;
top:10px;
right:10px;
background:rgba(0,0,0,0.6);
width:40px;
height:40px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
font-size:20px;
color:white;
cursor:pointer;
z-index:1000;
}

/* SETAS */
.nav{
position:absolute;
top:50%;
transform:translateY(-50%);
background:rgba(0,0,0,0.5);
color:white;
border:none;
font-size:20px;
padding:8px;
cursor:pointer;
border-radius:50%;
}

.prev{ left:5px; }
.next{ right:5px; }

</style>
</head>

<body>

<div class="topo">
<img src="../logo.png">
<div class="titulo">Catálogo de Produtos</div>
</div>

<div class="topo-botoes">
<button class="btn btn-azul" onclick="toggleCarrinho()">Carrinho</button>
<button class="btn btn-verde" onclick="enviarPedido()">Enviar</button>
</div>

<div id="carrinho" class="carrinho"></div>
<div class="grid" id="grid"></div>

<!-- MODAL -->
<div id="modal" class="modal">
<span class="close" onclick="fecharModal()">✕</span>

<div class="modal-content">
<button class="nav prev" onclick="anterior()">❮</button>
<img id="modalImg">
<button class="nav next" onclick="proxima()">❯</button>
<div id="modalDesc" class="modal-desc"></div>
</div>
</div>

<script>

/* --- seu JS permanece igual --- */

</script>

</body>
</html>
