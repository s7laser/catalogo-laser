<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Catálogo</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:15px;
}

/* TOPO */
.topo{
display:flex;
flex-direction:column;
align-items:center;
margin-bottom:20px;
}

.topo img{
max-width:160px;
}

.titulo{
font-size:22px;
font-weight:600;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
}

.card{
background:white;
padding:12px;
border-radius:12px;
display:flex;
flex-direction:column;
text-align:center;
}

.card-img{
position:relative;
}

.card img{
width:100%;
height:120px;
object-fit:contain;
}

/* PLAY */
.icone-video{
position:absolute;
top:6px;
right:6px;
background:rgba(0,0,0,0.6);
color:white;
padding:6px;
border-radius:50%;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.2)}
100%{transform:scale(1)}
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
z-index:999;
overflow:auto;
}

.modal-content{
max-width:500px;
margin:auto;
padding:20px;
text-align:center;
position:relative;
}

/* BOTÃO FECHAR CORRIGIDO */
.close{
position:absolute;
top:10px;
right:10px;
background:rgba(0,0,0,0.6);
color:white;
width:36px;
height:36px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
z-index:1000;
}

/* IMAGEM */
.modal img{
width:100%;
max-height:60vh;
object-fit:contain;
}

/* TEXTO */
.modal-desc{
color:white;
margin-top:10px;
font-size:13px;
}

/* VIDEO */
.btn-video{
margin-top:10px;
padding:10px;
background:#444;
color:white;
border:none;
border-radius:6px;
width:100%;
}

iframe{
margin-top:10px;
border-radius:8px;
}

</style>
</head>

<body>

<div class="topo">
<img src="../logo.png">
<div class="titulo">Catálogo de Produtos</div>
</div>

<div class="grid" id="grid"></div>

<div id="modal" class="modal">
<div class="modal-content">

<span class="close" onclick="fecharModal()">✕</span>

<img id="modalImg">
<div id="modalDesc" class="modal-desc"></div>
<div id="videoBox"></div>

</div>
</div>

<script>

let produtos=[]
let fotos=[]
let fotoIndex=0

fetch("https://opensheet.elk.sh/1ujUO0slYAkmxuxOLEOcAYVl1w9WNkIDY9rQpOfhtQtE/CATALOGO")
.then(r=>r.json())
.then(data=>{

produtos=data.map(p=>({

codigo:p.codigo,
nome:p.nome,
descricao:p.descricao || "",
foto:p.codigo+".jpg",
fotos:p.fotos ? p.fotos.split(",") : [p.codigo+".jpg"],
video:p.video || ""

}))

render()

})

function render(){

let grid=document.getElementById("grid")

produtos.forEach((p,i)=>{

let card=document.createElement("div")
card.className="card"

card.innerHTML=`
<div class="card-img">
<img src="../${p.foto}" onclick="abrirModal(${i})">
${p.video ? `<div class="icone-video">▶</div>` : ""}
</div>

<b>${p.codigo}</b>
<div>${p.nome}</div>
`

grid.appendChild(card)

})

}

function abrirModal(i){

let p=produtos[i]

fotos=p.fotos
fotoIndex=0

document.getElementById("modalImg").src="../"+fotos[0]
document.getElementById("modalDesc").innerText=p.descricao

let videoBox=document.getElementById("videoBox")

if(p.video){
videoBox.innerHTML=`
<button class="btn-video" onclick="abrirVideo('${p.video}')">
Ver vídeo
</button>
`
}else{
videoBox.innerHTML=""
}

document.getElementById("modal").style.display="block"
}

/* 🔥 CORREÇÃO COMPLETA YOUTUBE */
function abrirVideo(link){

let id=""

/* pega ID de qualquer formato */
let match = link.match(/(youtu\.be\/|v=|embed\/|shorts\/)([^&\n?#]+)/)

if(match && match[2]){
id = match[2]
}

document.getElementById("videoBox").innerHTML=`
<iframe width="100%" height="220"
src="https://www.youtube.com/embed/${id}"
allowfullscreen>
</iframe>

<button class="btn-video" onclick="fecharVideo()">Fechar vídeo</button>
`
}

function fecharVideo(){
document.getElementById("videoBox").innerHTML=""
}

function fecharModal(){
document.getElementById("modal").style.display="none"
}

</script>

</body>
</html>
